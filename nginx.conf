# NGINX Configuration with RTMP Module for Streaming
# Location: /etc/nginx/nginx.conf or /usr/local/etc/nginx/nginx.conf

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll; # Use epoll for better performance on Linux
}

# RTMP Configuration
rtmp {
    server {
        listen 1935; # Default RTMP port
        chunk_size 4096;
        timeout 600s;

        # Application for live streaming
        application live {
            live on;
            
            # HLS Configuration - Auto generates HLS from RTMP
            hls on;
            hls_path /var/www/hls;
            hls_fragment 2s;              # Fragment duration
            hls_playlist_length 12s;      # Playlist duration (3-4 fragments)
            hls_continuous on;            # Keep old segments
            hls_nested on;                # Create sub-directories per stream
            hls_cleanup on;               # Clean up old segments automatically

            # Recording (Optional - store copies of streams)
            # record all;
            # record_path /var/www/recordings;
            # record_suffix -%d-%b-%y-%H_%M_%S.flv;

            # Drop slow clients
            drop_idle_publisher 10s;

            # On publish - Validate stream_key with backend
            on_publish http://3.232.197.126:8081/api/streams/validate-key;
            
            # On publish done - Mark stream as stopped
            on_publish_done http://3.232.197.126:8081/api/streams/stop;

            # Support adaptive bitrate (ABR)
            # Multiple quality streams can be ingested
        }

        # Application for recording
        # application rec {
        #     live on;
        #     record all;
        #     record_path /var/www/recordings;
        # }
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Custom MIME types for streaming
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
        application/dash+xml mpd;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/atom+xml image/svg+xml;

    # Upstream for backend API validation
    upstream backend {
        server 3.232.197.126:8081;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        # HLS Streaming endpoint
        location /live {
            alias /var/www/hls;
            
            # Allow CORS for HLS playback
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Expose-Headers "Content-Length";

            # Cache control for HLS
            # Master playlist: Don't cache
            location ~ \.m3u8$ {
                add_header Cache-Control "public, max-age=0";
                types {
                    application/vnd.apple.mpegurl m3u8;
                }
            }

            # TS segments: Cache for 1 hour
            location ~ \.ts$ {
                add_header Cache-Control "public, max-age=3600";
                types {
                    video/mp2t ts;
                }
            }

            # Deny direct access to HLS folder
            location ~ /\. {
                deny all;
            }
        }

        # Stat endpoint (optional - to see active streams)
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
            add_header Access-Control-Allow-Origin *;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Backend API proxy (for validation)
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files
        location / {
            root /var/www/html;
            index index.html index.htm;
            
            # Try file, then directory, then 404
            try_files $uri $uri/ =404;
        }

        # Error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/www/html;
        }
    }

    # HTTPS Configuration (Uncomment and configure with valid SSL certificates)
    # server {
    #     listen 443 ssl http2;
    #     server_name your_domain.com;

    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;

    #     # Include same location blocks as HTTP server above
    #     location /live {
    #         alias /var/www/hls;
    #         # ... rest of config
    #     }
    # }

    # Redirect HTTP to HTTPS (Uncomment after SSL setup)
    # server {
    #     listen 80;
    #     server_name your_domain.com;
    #     return 301 https://$server_name$request_uri;
    # }
}
